<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WANTED: Captain Fadli Crew</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Sancreek&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1208;
      --bg-paper: #d4c4a8;
      --bg-paper-dark: #b8a685;
      --accent-gold: #c9a227;
      --accent-red: #8b2500;
      --text-dark: #2d1f0f;
      --wood-dark: #3d2512;
      --wood-light: #6b4423;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Courier Prime', monospace;
      background: var(--bg-dark);
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
    }

    .font-wanted { font-family: 'Rye', serif; }
    .font-poster { font-family: 'Sancreek', cursive; }

    .paper-texture {
      background: 
        linear-gradient(135deg, transparent 0%, rgba(0,0,0,0.03) 50%, transparent 100%),
        radial-gradient(ellipse at 20% 30%, rgba(201, 162, 39, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(139, 37, 0, 0.08) 0%, transparent 50%),
        linear-gradient(to bottom, #d9c9a8 0%, #c4b393 50%, #b8a685 100%);
      position: relative;
    }

    .paper-texture::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.08;
      pointer-events: none;
    }

    .wood-frame {
      background: linear-gradient(135deg, #5c3a1e 0%, #3d2512 50%, #2a1808 100%);
      box-shadow: 
        inset 0 2px 4px rgba(255,255,255,0.15),
        inset 0 -2px 4px rgba(0,0,0,0.4),
        0 8px 32px rgba(0,0,0,0.6);
    }

    .wood-frame::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 3px solid rgba(107, 68, 35, 0.6);
      border-radius: 2px;
      pointer-events: none;
    }

    .burnt-edges::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(45, 31, 15, 0.3) 100%);
      pointer-events: none;
    }

    .stamp {
      color: var(--accent-red);
      border: 3px solid var(--accent-red);
      padding: 4px 12px;
      transform: rotate(-12deg);
      opacity: 0.85;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .wanted-glow {
      text-shadow: 
        0 0 20px rgba(201, 162, 39, 0.3),
        2px 2px 0 rgba(45, 31, 15, 0.5);
    }

    .btn-pirate {
      background: linear-gradient(to bottom, #8b5a2b 0%, #5c3a1e 50%, #3d2512 100%);
      border: 2px solid #2a1808;
      box-shadow: 
        inset 0 1px 2px rgba(255,255,255,0.2),
        0 4px 8px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
      color: #d4c4a8;
    }

    .btn-pirate:hover { transform: translateY(-2px); }
    .btn-pirate:active { transform: translateY(1px); }

    .filter-btn { 
      transition: all 0.2s ease;
      background: #c4b393;
      border: 2px solid #2d1f0f;
      color: #2d1f0f;
    }
    .filter-btn:hover { transform: translateY(-2px); }
    .filter-btn.active { 
      box-shadow: 0 0 0 3px var(--accent-gold);
      background: #d4c4a8;
      font-weight: bold;
    }

    .viewfinder {
      border: 4px solid var(--text-dark);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #liveCanvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fix Mobile: Video harus ada di DOM tapi disembunyikan dengan opacity agar tetap jalan */
    #videoPreview {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes flash {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    .flash { animation: flash 0.3s ease-out; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeSlideIn 0.6s ease-out forwards; }
    .animate-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .animate-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
    .animate-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

    .skull-decoration { filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
    .result-poster { background: linear-gradient(to bottom, #d9c9a8 0%, #c4b393 50%, #b8a685 100%); }
    
    body::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  
  <div id="app" class="min-h-screen py-6 px-4">
    
    <!-- Camera View -->
    <div id="cameraView" class="max-w-lg mx-auto">
      <div class="wood-frame relative rounded-sm p-3 sm:p-4">
        <div class="paper-texture burnt-edges relative p-6 sm:p-8 text-center">
          
          <!-- Header -->
          <div class="flex justify-center mb-4 animate-in">
            <svg id="skullSvg" class="skull-decoration w-16 h-16" viewBox="0 0 64 64" fill="none">
              <ellipse cx="32" cy="28" rx="18" ry="20" fill="#2d1f0f"/>
              <ellipse cx="24" cy="26" rx="5" ry="6" fill="#d4c4a8"/>
              <ellipse cx="40" cy="26" rx="5" ry="6" fill="#d4c4a8"/>
              <path d="M28 38 L32 44 L36 38" stroke="#2d1f0f" stroke-width="2" fill="none"/>
              <path d="M8 22 Q32 -8 56 22 Q48 18 32 16 Q16 18 8 22" fill="#2d1f0f"/>
              <rect x="12" y="18" width="40" height="6" fill="#2d1f0f"/>
              <line x1="8" y1="52" x2="24" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
              <line x1="24" y1="52" x2="8" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
              <line x1="40" y1="52" x2="56" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
              <line x1="56" y1="52" x2="40" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </div>

          <h1 class="font-wanted text-4xl sm:text-5xl text-[#2d1f0f] tracking-wider wanted-glow animate-in animate-in-delay-1">WANTED</h1>
          <div class="h-1 bg-gradient-to-r from-transparent via-[#2d1f0f] to-transparent my-2 animate-in animate-in-delay-1"></div>
          <h2 class="font-poster text-xl sm:text-2xl text-[#2d1f0f] tracking-wide animate-in animate-in-delay-1">CAPTAIN FADLI CREW</h2>
          <p class="text-sm text-[#5c4a32] mt-2 italic animate-in animate-in-delay-2">"Capture your pirate moment in vintage style"</p>

          <!-- Camera Preview -->
          <div class="mt-6 animate-in animate-in-delay-2">
            <div class="viewfinder relative aspect-[3/4] max-w-xs mx-auto">
              
              <!-- Video tersembunyi tapi aktif -->
              <video id="videoPreview" autoplay playsinline muted></video>
              <canvas id="liveCanvas"></canvas>
              
              <!-- Viewfinder corners -->
              <div class="absolute top-2 left-2 w-6 h-6 border-l-2 border-t-2 border-[#c9a227] pointer-events-none z-10"></div>
              <div class="absolute top-2 right-2 w-6 h-6 border-r-2 border-t-2 border-[#c9a227] pointer-events-none z-10"></div>
              <div class="absolute bottom-2 left-2 w-6 h-6 border-l-2 border-b-2 border-[#c9a227] pointer-events-none z-10"></div>
              <div class="absolute bottom-2 right-2 w-6 h-6 border-r-2 border-b-2 border-[#c9a227] pointer-events-none z-10"></div>
              
              <div id="flashOverlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-20"></div>
            </div>
          </div>

          <!-- Filter Panel -->
          <div class="mt-6 animate-in animate-in-delay-3">
            <p class="text-xs text-[#5c4a32] mb-3 font-bold tracking-wider">SELECT CAMERA MODE</p>
            <div id="effectsPanel" class="flex justify-center gap-3 flex-wrap">
              <button data-effect="original" class="filter-btn active px-4 py-2 rounded text-sm">Original</button>
              <button data-effect="vintage" class="filter-btn px-4 py-2 rounded text-sm">Vintage</button>
              <button data-effect="aesthetic" class="filter-btn px-4 py-2 rounded text-sm">Aesthetic</button>
            </div>
          </div>

          <div class="mt-6 animate-in animate-in-delay-3">
            <button id="captureBtn" class="btn-pirate font-wanted text-lg px-8 py-3 rounded tracking-widest">
              CAPTURE
            </button>
          </div>
          
        </div>
      </div>
    </div>

    <!-- Result View -->
    <div id="resultView" class="hidden max-w-lg mx-auto">
      <div class="wood-frame relative rounded-sm p-3 sm:p-4">
        <div class="result-poster relative p-6 sm:p-8 text-center">
          
          <!-- Header Result -->
          <div class="flex justify-center mb-2">
            <svg class="skull-decoration w-14 h-14" viewBox="0 0 64 64" fill="none">
              <ellipse cx="32" cy="28" rx="18" ry="20" fill="#2d1f0f"/>
              <ellipse cx="24" cy="26" rx="5" ry="6" fill="#d4c4a8"/>
              <ellipse cx="40" cy="26" rx="5" ry="6" fill="#d4c4a8"/>
              <path d="M28 38 L32 44 L36 38" stroke="#2d1f0f" stroke-width="2" fill="none"/>
              <path d="M8 22 Q32 -8 56 22 Q48 18 32 16 Q16 18 8 22" fill="#2d1f0f"/>
              <rect x="12" y="18" width="40" height="6" fill="#2d1f0f"/>
              <line x1="8" y1="52" x2="24" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
              <line x1="24" y1="52" x2="8" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
              <line x1="40" y1="52" x2="56" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
              <line x1="56" y1="52" x2="40" y2="60" stroke="#2d1f0f" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </div>

          <h1 class="font-wanted text-4xl sm:text-5xl text-[#2d1f0f] tracking-wider wanted-glow">WANTED</h1>
          <div class="h-1 bg-gradient-to-r from-transparent via-[#2d1f0f] to-transparent my-2"></div>
          <h2 class="font-poster text-xl sm:text-2xl text-[#2d1f0f] tracking-wide">CAPTAIN FADLI CREW</h2>

          <!-- Photo Container -->
          <div class="mt-4 relative inline-block">
            <div class="border-4 border-[#2d1f0f] bg-[#1a1208] p-1">
              <canvas id="resultCanvas" class="block"></canvas>
            </div>
            <!-- Corner Decorations -->
            <div class="absolute -top-2 -left-2 w-4 h-4 bg-[#c9a227] rounded-full"></div>
            <div class="absolute -top-2 -right-2 w-4 h-4 bg-[#c9a227] rounded-full"></div>
            <div class="absolute -bottom-2 -left-2 w-4 h-4 bg-[#c9a227] rounded-full"></div>
            <div class="absolute -bottom-2 -right-2 w-4 h-4 bg-[#c9a227] rounded-full"></div>
          </div>

          <div class="mt-6"> <!-- Tambah margin top -->
            <p class="font-wanted text-lg text-[#2d1f0f] tracking-wide">REWARD</p>
            <p class="font-poster text-xl text-[#8b2500] tracking-wider">LEGENDARY TREASURE</p>
          </div>

          <div class="mt-4 inline-block">
            <div class="stamp font-wanted text-sm">NEW RECRUIT</div>
          </div>
          <p id="dateDisplay" class="text-xs text-[#5c4a32] mt-4 font-bold"></p>
          
        </div>
      </div>

      <div class="flex justify-center gap-4 mt-6">
        <button id="downloadBtn" class="btn-pirate font-wanted text-sm px-6 py-2 rounded tracking-wider">DOWNLOAD</button>
        <button id="retakeBtn" class="btn-pirate font-wanted text-sm px-6 py-2 rounded tracking-wider">RETAKE</button>
      </div>
      
    </div>
  </div>

  <script>
    // State
    let currentEffect = 'original';
    let stream = null;
    let animationId = null;
    
    // Filter Definitions
    const filterStyles = {
      'original': 'none',
      'vintage': 'sepia(0.7) contrast(1.2) brightness(0.95) saturate(1.1)',
      'aesthetic': 'sepia(0.3) saturate(1.2) contrast(1.1) brightness(1.15)'
    };

    // DOM Elements
    let videoPreview, liveCanvas, liveCtx, resultCanvas;
    let captureBtn, downloadBtn, retakeBtn, flashOverlay;
    let cameraView, resultView, dateDisplay, effectsPanel;

    // Initialize
    async function initApp() {
      videoPreview = document.getElementById('videoPreview');
      liveCanvas = document.getElementById('liveCanvas');
      liveCtx = liveCanvas.getContext('2d');
      resultCanvas = document.getElementById('resultCanvas');
      
      captureBtn = document.getElementById('captureBtn');
      downloadBtn = document.getElementById('downloadBtn');
      retakeBtn = document.getElementById('retakeBtn');
      flashOverlay = document.getElementById('flashOverlay');
      
      cameraView = document.getElementById('cameraView');
      resultView = document.getElementById('resultView');
      dateDisplay = document.getElementById('dateDisplay');
      effectsPanel = document.getElementById('effectsPanel');

      captureBtn.addEventListener('click', capturePhoto);
      downloadBtn.addEventListener('click', downloadPoster);
      retakeBtn.addEventListener('click', retakePhoto);

      effectsPanel.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => selectEffect(btn.dataset.effect));
      });

      await initCamera();
    }

    // Camera Init - Fix for Mobile
    async function initCamera() {
      try {
        // Constraints untuk mobile dan desktop
        const constraints = {
          video: { 
            facingMode: 'user', 
            width: { ideal: 1280 }, // Minta resolusi besar, tapi akan di-downscale canvas-nya
            height: { ideal: 720 } 
          },
          audio: false
        };
        
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        
        videoPreview.srcObject = stream;
        
        // FIX: Gunakan event 'playing' agar lebih reliable di mobile
        videoPreview.onplaying = () => {
          // Set canvas size (jangan terlalu besar agar performa HP bagus)
          // Kita set max 640 lebar
          const vw = videoPreview.videoWidth;
          const vh = videoPreview.videoHeight;
          
          // Scaling down jika terlalu besar untuk kinerja mobile
          const scale = Math.min(1, 800 / vw); 
          
          liveCanvas.width = vw * scale;
          liveCanvas.height = vh * scale;
          
          console.log(`Canvas size: ${liveCanvas.width}x${liveCanvas.height}`);
          
          renderLoop();
        };

        // Paksa play untuk browser ketat
        await videoPreview.play();

      } catch (err) {
        console.error('Camera error:', err);
        alert('Gagal mengakses kamera. Pastikan izin kamera sudah diberikan.');
      }
    }

    // Render Loop
    function renderLoop() {
      if (!videoPreview.paused && !videoPreview.ended) {
        liveCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
        liveCtx.save();
        
        // Mirror
        liveCtx.translate(liveCanvas.width, 0);
        liveCtx.scale(-1, 1);
        
        // Apply Filter via Context
        liveCtx.filter = filterStyles[currentEffect];
        
        // Draw scaled
        liveCtx.drawImage(videoPreview, 0, 0, liveCanvas.width, liveCanvas.height);
        
        liveCtx.restore();
      }
      animationId = requestAnimationFrame(renderLoop);
    }

    // Select Effect
    function selectEffect(effect) {
      currentEffect = effect;
      effectsPanel.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.effect === effect);
      });
    }

    // CAPTURE PHOTO
    function capturePhoto() {
      // Flash FX
      flashOverlay.classList.add('flash');
      setTimeout(() => flashOverlay.classList.remove('flash'), 300);

      // Setup Result Canvas
      const w = 300; 
      const h = 400;
      resultCanvas.width = w;
      resultCanvas.height = h;
      const rCtx = resultCanvas.getContext('2d');

      // Clear
      rCtx.clearRect(0, 0, w, h);

      // Calculate Crop
      const canvasW = liveCanvas.width;
      const canvasH = liveCanvas.height;
      const ratio = w/h;
      const canvasRatio = canvasW/canvasH;

      let sx = 0, sy = 0, sw = canvasW, sh = canvasH;

      if (canvasRatio > ratio) {
          sw = canvasH * ratio;
          sx = (canvasW - sw) / 2;
      } else {
          sh = canvasW / ratio;
          sy = (canvasH - sh) / 2;
      }

      // Draw dari liveCanvas (yang sudah ter-filter dan ter-mirror)
      rCtx.drawImage(liveCanvas, sx, sy, sw, sh, 0, 0, w, h);

      showResult();
    }

    // Show Result
    function showResult() {
      cancelAnimationFrame(animationId);
      if (stream) stream.getTracks().forEach(track => track.stop());

      const now = new Date();
      dateDisplay.textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

      cameraView.classList.add('hidden');
      resultView.classList.remove('hidden');
    }

    // DOWNLOAD POSTER
    function downloadPoster() {
      const posterCanvas = document.createElement('canvas');
      const posterCtx = posterCanvas.getContext('2d');
      
      const pW = 600; 
      const pH = 850; // Sedikit tinggiin biar muat text
      posterCanvas.width = pW;
      posterCanvas.height = pH;

      // 1. Background
      const grad = posterCtx.createLinearGradient(0, 0, 0, pH);
      grad.addColorStop(0, '#d9c9a8');
      grad.addColorStop(0.5, '#c4b393');
      grad.addColorStop(1, '#b8a685');
      posterCtx.fillStyle = grad;
      posterCtx.fillRect(0, 0, pW, pH);

      // 2. Texts
      posterCtx.textAlign = 'center';
      
      posterCtx.font = '70px Rye, serif';
      posterCtx.fillStyle = '#2d1f0f';
      posterCtx.fillText('WANTED', pW/2, 120);

      posterCtx.font = '30px Sancreek, cursive';
      posterCtx.fillText('CAPTAIN FADLI CREW', pW/2, 170);

      // Photo Frame Position - FIX MARGIN
      const frameW = 300; 
      const frameH = 400;
      const frameX = (pW - frameW) / 2; 
      const frameY = 200; // Geser sedikit ke bawah
      
      // Draw Frame Border
      posterCtx.fillStyle = '#2d1f0f';
      posterCtx.fillRect(frameX, frameY, frameW, frameH);
      
      // Draw Photo
      const padding = 8;
      posterCtx.drawImage(resultCanvas, frameX + padding, frameY + padding, frameW - (padding*2), frameH - (padding*2));

      // Gold Corners
      drawGoldCircle(posterCtx, frameX, frameY, 10);
      drawGoldCircle(posterCtx, frameX + frameW, frameY, 10);
      drawGoldCircle(posterCtx, frameX, frameY + frameH, 10);
      drawGoldCircle(posterCtx, frameX + frameW, frameY + frameH, 10);

      // Texts Below Photo - FIX MARGIN
      // Frame ends at 200 + 400 = 600. 
      // Let's put Reward at 660 (gap 60px)
      
      posterCtx.font = '30px Rye, serif';
      posterCtx.fillStyle = '#2d1f0f';
      posterCtx.fillText('REWARD', pW/2, 660);
      
      posterCtx.font = '28px Sancreek, cursive';
      posterCtx.fillStyle = '#8b2500';
      posterCtx.fillText('LEGENDARY TREASURE', pW/2, 700);

      // Stamp
      posterCtx.save();
      posterCtx.translate(pW/2, 750); // Geser ke bawah
      posterCtx.rotate(-12 * Math.PI / 180);
      posterCtx.font = 'bold 20px Rye, serif';
      posterCtx.strokeStyle = '#8b2500';
      posterCtx.lineWidth = 3;
      posterCtx.strokeRect(-70, -20, 140, 35);
      posterCtx.fillStyle = '#8b2500';
      posterCtx.fillText('NEW RECRUIT', 0, 5);
      posterCtx.restore();

      // Date
      posterCtx.font = 'bold 18px Courier Prime, monospace';
      posterCtx.fillStyle = '#5c4a32';
      posterCtx.fillText(dateDisplay.textContent, pW/2, 810); // Geser ke bawah

      // Skull
      const svgElement = document.getElementById('skullSvg');
      const svgData = new XMLSerializer().serializeToString(svgElement);
      const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
      const svgUrl = URL.createObjectURL(svgBlob);
      
      const skullImg = new Image();
      skullImg.onload = () => {
        posterCtx.drawImage(skullImg, pW/2 - 60, 20, 120, 120);
        URL.revokeObjectURL(svgUrl);
        
        // Trigger Download
        const link = document.createElement('a');
        link.download = 'wanted-captain-fadli-crew.png';
        link.href = posterCanvas.toDataURL('image/png');
        link.click();
      };
      skullImg.src = svgUrl;
    }

    function drawGoldCircle(ctx, x, y, r) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = '#c9a227';
        ctx.fill();
        ctx.closePath();
    }

    // Retake
    async function retakePhoto() {
      resultView.classList.add('hidden');
      cameraView.classList.remove('hidden');
      currentEffect = 'original';
      effectsPanel.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.effect === 'original');
      });
      await initCamera();
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
